name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  test:
    name: Test and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: dart test

  test-installer:
    name: Test installer script
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Run installer with local repo
        run: FAM_INSTALL_DIR=/tmp/fam_ci FAM_BIN_DIR=/tmp/fam_ci/bin FAM_REPO_DIR="$GITHUB_WORKSPACE" bash scripts/install.sh

      - name: Verify installed command
        run: /tmp/fam_ci/bin/agent_memory --help

  build-binaries:
    name: Build native binaries
    needs: test-installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
          - os: macos-latest
            target_os: macos
          - os: windows-latest
            target_os: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Detect architecture (Unix)
        if: runner.os != 'Windows'
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64|amd64) target_arch=x64 ;;
            arm64|aarch64) target_arch=arm64 ;;
            *) target_arch=$arch ;;
          esac
          echo "TARGET_ARCH=$target_arch" >> "$GITHUB_ENV"
          echo "EXT=" >> "$GITHUB_ENV"

      - name: Detect architecture (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = $env:PROCESSOR_ARCHITECTURE
          $targetArch = switch ($arch) {
            "ARM64" { "arm64" }
            default { "x64" }
          }
          "TARGET_ARCH=$targetArch" >> $env:GITHUB_ENV
          "EXT=.exe" >> $env:GITHUB_ENV

      - name: Compile native binary
        shell: bash
        run: |
          mkdir -p build
          output="build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}${{ env.EXT }}"
          dart compile exe bin/agent_memory.dart -o "$output"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}
          path: build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}*
          if-no-files-found: error

  package-installers:
    name: Package installer scripts
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: install-scripts
          path: |
            install
            scripts/install.sh
            scripts/install.ps1
            scripts/install.bat
            scripts/agent_memory.sh
            scripts/agent_memory.bat
            scripts/agent_memory.ps1
          if-no-files-found: error
