name: Release agent_memory

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version (e.g., 0.1.2). Leave empty to auto-increment patch version.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  version-and-tag:
    name: Determine version, update pubspec, and create tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.new_version.outputs.version }}
      current_version: ${{ steps.current_version.outputs.current }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies and verify
        run: |
          dart pub get
          dart analyze
          dart test

      - name: Read current version
        id: current_version
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version: //;s/[[:space:]]*$//')
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Determine new version
        id: new_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            NEW_VERSION="${TAG#v}"
            echo "Using pushed tag: $NEW_VERSION"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
            echo "Using custom version: $NEW_VERSION"
          else
            CURRENT_VERSION="${{ steps.current_version.outputs.current }}"
            IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
            MAJOR="${VERSION_PARTS[0]}"
            MINOR="${VERSION_PARTS[1]}"
            PATCH="${VERSION_PARTS[2]}"
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "Auto-incremented version: $NEW_VERSION"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update pubspec.yaml (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          cat pubspec.yaml | grep '^version:'

      - name: Commit version change (manual only)
        id: commit
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git add pubspec.yaml
          git commit -m "version increased to $NEW_VERSION"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git tag "v$NEW_VERSION"
          echo "Created tag: v$NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          NEW_TAG="v$NEW_VERSION"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_VERSION="${{ steps.current_version.outputs.current }}"
            PREV_TAG="v$CURRENT_VERSION"
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          fi

          {
            echo "## 📝 What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
              git log --pretty=format:'- %s (%h)' "$PREV_TAG..$NEW_TAG"
            else
              git log --pretty=format:'- %s (%h)' --reverse "$NEW_TAG"
            fi
            echo ""
          } > changelog.md

          echo "--- Generated changelog ---"
          cat changelog.md
          echo "--- End changelog ---"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-changelog
          path: changelog.md
          retention-days: 7

      - name: Push changes and tag (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git push origin main
          git push origin "v$NEW_VERSION"

      - name: Output ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=v${{ steps.new_version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          echo "✅ Version and tag prepared successfully!"
          echo "📦 Old version: ${{ steps.current_version.outputs.current }}"
          echo "🚀 New version: ${{ steps.new_version.outputs.version }}"
          echo "🏷️  Tag: v${{ steps.new_version.outputs.version }}"

  build-binaries:
    name: Build release binaries
    needs: version-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
          - os: macos-15
            target_os: macos
          - os: windows-latest
            target_os: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version-and-tag.outputs.ref }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Detect architecture (Unix)
        if: runner.os != 'Windows'
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64|amd64) target_arch=x64 ;;
            arm64|aarch64) target_arch=arm64 ;;
            *) target_arch=$arch ;;
          esac
          echo "TARGET_ARCH=$target_arch" >> "$GITHUB_ENV"
          echo "EXT=" >> "$GITHUB_ENV"

      - name: Detect architecture (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = $env:PROCESSOR_ARCHITECTURE
          $targetArch = switch ($arch) {
            "ARM64" { "arm64" }
            default { "x64" }
          }
          "TARGET_ARCH=$targetArch" >> $env:GITHUB_ENV
          "EXT=.exe" >> $env:GITHUB_ENV

      - name: Compile native binary
        shell: bash
        run: |
          mkdir -p build
          output="build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}${{ env.EXT }}"
          dart compile exe bin/agent_memory.dart -o "$output"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}
          path: build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}*
          if-no-files-found: error

  create-release:
    name: Create unified release
    needs: [version-and-tag, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version-and-tag.outputs.ref }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent_memory-*
          path: artifacts
          merge-multiple: true

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: release-changelog
          path: changelog/

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp artifacts/agent_memory-* release-assets/ || true
          cp install release-assets/install
          cp scripts/install.sh release-assets/
          cp scripts/install.ps1 release-assets/
          cp scripts/install.bat release-assets/
          cp scripts/agent_memory.sh release-assets/
          cp scripts/agent_memory.bat release-assets/
          cp scripts/agent_memory.ps1 release-assets/
          ls -lh release-assets/

      - name: Generate release notes
        run: |
          VERSION="${{ needs.version-and-tag.outputs.version }}"
          CHANGELOG_FILE="changelog/changelog.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            CHANGELOG_CONTENT=$(cat "$CHANGELOG_FILE")
          else
            CHANGELOG_CONTENT="## 📝 What's Changed\n\nNo changelog available for this release."
          fi

          cat > release_notes.md << EOF
          # 🚀 agent_memory Release v${VERSION}

          ${CHANGELOG_CONTENT}

          ---

          A Dart memory / knowledge-base CLI and library. Turn text, images, or directories into a structured Markdown KB and query it with any OpenAI-compatible LLM.

          ## 📦 What's Included

          - **Native binaries** for Linux, macOS, and Windows
          - **Cross-platform install scripts** (bash, PowerShell, Windows batch)
          - **Development wrappers** for running from source

          ## 🎯 Quick Start

          ### Install the CLI

          **macOS / Linux:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
          \`\`\`

          **Windows (cmd.exe):**
          \`\`\`cmd
          curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.bat -o %TEMP%\\agent_memory-install.bat && %TEMP%\\agent_memory-install.bat
          \`\`\`

          ### Install a Specific Version (v${VERSION})

          **macOS / Linux:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${VERSION}/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://github.com/${{ github.repository }}/releases/download/v${VERSION}/install.ps1 | iex
          \`\`\`

          ## 🛠️ Development Wrapper

          If you already have the repo cloned and Dart installed:

          \`\`\`bash
          ./scripts/agent_memory.sh --help
          \`\`\`

          ## 📋 System Requirements

          - **Dart SDK 3.12+** (only if running from source; the native binary has no runtime dependency)
          - ~50 MB disk space

          ## 📊 Build Information

          - **Version:** v${VERSION}
          - **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit:** \`${GITHUB_SHA:0:8}\`

          ## 🐛 Troubleshooting

          - If \`agent_memory\` is not found after install, restart your terminal or run \`source ~/.bashrc\` / \`source ~/.zshrc\`.
          - For source runs, ensure a \`.env\` file with your LLM credentials is in the working directory.

          ## 🆘 Getting Help

          - **Issues:** https://github.com/${{ github.repository }}/issues
          - **Repository:** https://github.com/${{ github.repository }}
          EOF

          echo "Release notes generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.version-and-tag.outputs.version }}
          name: "agent_memory v${{ needs.version-and-tag.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: release-assets/*

      - name: Summary
        run: |
          VERSION="${{ needs.version-and-tag.outputs.version }}"
          echo "## 🎉 Release Created Successfully!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Install" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
