name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  actions: write

jobs:
  build-binaries:
    name: Build release binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
          - os: macos-latest
            target_os: macos
          - os: windows-latest
            target_os: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Detect architecture (Unix)
        if: runner.os != 'Windows'
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64|amd64) target_arch=x64 ;;
            arm64|aarch64) target_arch=arm64 ;;
            *) target_arch=$arch ;;
          esac
          echo "TARGET_ARCH=$target_arch" >> "$GITHUB_ENV"
          echo "EXT=" >> "$GITHUB_ENV"

      - name: Detect architecture (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = $env:PROCESSOR_ARCHITECTURE
          $targetArch = switch ($arch) {
            "ARM64" { "arm64" }
            default { "x64" }
          }
          "TARGET_ARCH=$targetArch" >> $env:GITHUB_ENV
          "EXT=.exe" >> $env:GITHUB_ENV

      - name: Compile native binary
        shell: bash
        run: |
          mkdir -p build
          output="build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}${{ env.EXT }}"
          dart compile exe bin/agent_memory.dart -o "$output"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}
          path: build/agent_memory-${{ matrix.target_os }}-${{ env.TARGET_ARCH }}*
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package install scripts
        run: |
          mkdir -p artifacts/install-scripts
          cp install artifacts/install-scripts/
          cp scripts/install.sh scripts/install.ps1 scripts/install.bat artifacts/install-scripts/
          cp scripts/agent_memory.sh scripts/agent_memory.bat scripts/agent_memory.ps1 artifacts/install-scripts/
          cd artifacts/install-scripts
          zip -r ../install-scripts.zip .

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          for dir in artifacts/agent_memory-*; do
            [ -d "$dir" ] || continue
            cp "$dir"/* release-assets/
          done
          cp artifacts/install-scripts.zip release-assets/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
